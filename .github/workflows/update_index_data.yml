name: 更新指数估值数据

on:
  schedule:
    # 北京时间 21:10（UTC 13:10）——晚于两个引擎写飞书的时间(20:17/20:51)，确保读到当日最新
    - cron: '10 13 * * *'
  workflow_dispatch: {}   # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 拉取飞书最新状态 → 生成 JSON
        env:
          FEISHU_APP_ID:             ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:         ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN_300:      ${{ secrets.FEISHU_APP_TOKEN_300 }}
          FEISHU_PE_HISTORY_TABLE_ID: ${{ secrets.FEISHU_PE_HISTORY_TABLE_ID }}
          FEISHU_APP_TOKEN_922:      ${{ secrets.FEISHU_APP_TOKEN_922 }}
          FEISHU_DATA_TABLE_922:     ${{ secrets.FEISHU_DATA_TABLE_922 }}
        run: python scripts/fetch_index_state.py

      - name: 提交变更（仅在有更新时）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add invest/strategy/data/*.json
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: 更新指数估值数据 $(date -u +%Y-%m-%d)"
            git push
          fi
